<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DOROBO — 문화식 원형 에디터</title>
<link rel="stylesheet" href="css/style.css?v=2026072302">
</head>
<body>

<header class="app-header">
  <div class="brand-block">
    <span class="brand">DOROBO</span>
    <span class="brand-sub">문화식 원형</span>
  </div>

  <nav class="stage-bar" aria-label="작업 단계" role="tablist">
    <button type="button" class="stage" role="tab" data-stage="draft"  aria-selected="true"  title="원형">원형</button>
    <button type="button" class="stage" role="tab" data-stage="design" aria-selected="false" title="디자인">디자인</button>
    <button type="button" class="stage" disabled aria-disabled="true" title="준비 중">재단</button>
    <button type="button" class="stage" disabled aria-disabled="true" title="준비 중">출력</button>
  </nav>

  <div class="header-actions">
    <!-- undo/redo 의 실제 범위는 곡선 핸들 편집이다(pushUndoSnapshot 이 편집모드에서만 호출됨). -->
    <button class="btn" onclick="undoEdit()" aria-label="곡선 편집 실행취소" title="곡선 편집 실행취소">실행취소</button>
    <button class="btn" onclick="redoEdit()" aria-label="곡선 편집 다시실행" title="곡선 편집 다시실행">다시실행</button>
    <!-- 화면 초기화(뷰 리셋)를 좌측 rail·캔버스 툴바가 아니라 header 우측으로 이동(복제 아님, resetView onclick 보존) -->
    <button class="btn" onclick="resetView()" title="화면 초기화">화면 초기화</button>

    <details class="pop pop-right" data-menu="view">
      <summary aria-label="보기 메뉴" title="보기">보기</summary>
      <div class="pop-body">
        <!-- 실측상 동작하지 않는 3개(chkDartWaist/chkPattern/chkDep)는 wrapper 에 hidden 을
             주어 시각·키보드 접근에서 제거한다. render.js 가 layer-pattern / layer-dep 그룹을
             만들지 않아 toggleLayer 가 대상 없이 끝나는 **기존 결함**이며, 이번 UI 작업에서
             엔진을 고치지 않는다. input 의 id·onchange·checked 는 그대로 보존한다
             (DOM id 계약 유지 + 렌더 결함이 고쳐지면 hidden 만 떼면 된다). -->
        <div class="row"><label>기초선</label><input type="checkbox" id="chkBase" checked onchange="toggleLayer('layer-base',this.checked)"></div>
        <div class="row" hidden><label>허리다트</label><input type="checkbox" id="chkDartWaist" checked onchange="applyLayerVisibility()"></div>
        <div class="row"><label>치수</label><input type="checkbox" id="chkDim" checked onchange="toggleLayer('layer-dim',this.checked)"></div>
        <div class="row" hidden><label>패턴선</label><input type="checkbox" id="chkPattern" checked onchange="toggleLayer('layer-pattern',this.checked)"></div>
        <div class="row"><label>안내점</label><input type="checkbox" id="chkGuide" checked onchange="toggleLayer('layer-points',this.checked)"></div>
        <div class="row" hidden><label>종속선</label><input type="checkbox" id="chkDep" checked onchange="toggleLayer('layer-dep',this.checked)"></div>
      </div>
    </details>

    <details class="pop pop-right" data-menu="file">
      <summary aria-label="파일 메뉴" title="파일">파일</summary>
      <div class="pop-body">
        <div class="row"><label>곡선 저장</label><button class="btn" onclick="saveCurveData()">저장</button></div>
        <div class="row"><label>마지막 저장선</label><button class="btn" onclick="loadSavedCurveForCurrentMeasurements(true)">불러오기</button></div>
        <div class="row note" id="saveCount">저장 0건</div>
        <div class="row"><label>데이터 내보내기</label><button class="btn" onclick="exportData()">JSON 다운로드</button></div>
        <div class="row"><label>데이터 가져오기</label><input type="file" id="inpImportData" accept="application/json,.json" style="display:none" onchange="importDataFromFile(this)"><button class="btn" onclick="document.getElementById('inpImportData').click()">JSON 불러오기</button></div>
        <div class="row"><label>패턴 내보내기</label><button class="btn" onclick="exportDXF()">DXF 다운로드</button></div>
      </div>
    </details>
  </div>
</header>

<div class="workspace">

  <main class="canvas-wrap">
    <!-- 1행 primary bar: 도구(다트이동/곡선편집) ‖ 모드(전체/몸판/소매). SVG 를 덮지 않고 형제. -->
    <div class="canvas-toolbar">
      <div class="seg">
        <!-- 좌측 rail 에서 이동. 기능은 기존 onclick 이 담당. btnDartMove 는 JS(setBtn)가
             textContent/inline background 를 덮으므로 자식 <svg> 대신 ::before 아이콘. -->
        <button class="tool tool-dart" id="btnDartMove" data-tool="dart" onclick="toggleDartMove()" aria-pressed="false" aria-label="다트 이동 시작" title="다트 이동 시작">다트이동 시작</button>
        <button type="button" class="tool" data-tool="curves" aria-pressed="false" aria-label="곡선 편집" title="곡선 편집">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><title>곡선 편집</title><path d="M3 18c4 0 6-12 10-12s5 6 8 6"/><circle cx="3" cy="18" r="1.5"/><circle cx="21" cy="12" r="1.5"/></svg>
        </button>
      </div>
      <div class="bar-divider"></div>
      <div class="seg">
        <button class="mode-btn active" id="modeAll" onclick="setWorkMode('all')">전체</button>
        <button class="mode-btn" id="modeBody" onclick="setWorkMode('body')">몸판</button>
        <button class="mode-btn" id="modeSleeve" onclick="setWorkMode('sleeve')">소매</button>
      </div>
    </div>

    <!-- 2행 context host: 선택 도구가 있을 때만 표시. 비면 CSS :has 로 display:none(높이 0).
         내부 두 context 는 최초부터 존재하고 hidden 으로만 전환(innerHTML·재생성 없음). -->
    <div class="context-host">
      <details class="insp" open data-panel="curves" hidden>
        <summary>곡선 편집</summary>
        <div class="insp-body">
          <div class="row"><label>진동선</label><button class="btn" id="btnArmEdit" onclick="toggleArmEdit()">편집 시작</button></div>
          <div class="row"><label>네크라인</label><button class="btn" id="btnNeckEdit" onclick="toggleNeckEdit()">편집 시작</button></div>
          <div class="row"><label>소매산</label><button class="btn" id="btnSleeveEdit" onclick="toggleSleeveEdit()">편집 시작</button></div>
          <div class="row"><label>소매산 리셋</label><button class="btn" id="btnSleeveReset" onclick="resetSleeveAnchors()">소매산 리셋</button></div>
          <div class="row"><label>곡선핸들 전체리셋</label><button class="btn" onclick="resetCurveHandles();render()">리셋</button></div>
        </div>
      </details>

      <!-- 다트 도구 선택 시 표시. idle/busy 는 ui.js 가 실제 DOM 에서 파생해 hidden 으로만
           전환한다. 앞/뒤 행은 기존 setSideRowVisible 의 display "" / "none" 계약 유지. -->
      <section class="context-strip" aria-label="다트 이동" data-panel="dart" hidden>
        <div class="insp-title">다트 이동</div>
        <p class="note" data-dart-idle>다트 이동 도구를 눌러 작업을 시작하세요.</p>
        <div class="dart-busy" data-dart-busy hidden>
          <div class="row" id="dartSideRow" style="display:none;gap:4px">
            <button class="btn" id="btnDartSideFront" onclick="selectDartSide('front')">앞판</button>
            <button class="btn" id="btnDartSideBack"  onclick="selectDartSide('back')">뒤판</button>
          </div>

          <!-- 가시 항목: 이동 가능각 · 회전량 · 전체 다트각 · hint · 리셋 | 적용(최우측) -->
          <div class="row"><label>이동 가능각</label><span class="prop-val" id="dartPropRange">—</span></div>
          <div class="row"><label>회전량</label><span class="prop-val" id="dartPropRotation">—</span></div>
          <div class="row"><label>전체 다트각</label><span class="prop-val" id="dartPropBudget">—</span></div>
          <div class="row note" id="dartMoveHint"></div>
          <div class="row" style="gap:4px">
            <button class="btn" onclick="resetDartMove()">리셋</button>
            <button class="btn action-primary" id="btnDartApply" onclick="applyDartMove()" disabled>적용</button>
          </div>

          <!-- DOM 계약 보존용 숨김 보관: ui.js updateDartInspector 가 이 id 들을 계속 채우지만
               화면에는 중복 표시하지 않는다(대상 / 현재 단계 / 소스 다트각). 바깥 wrapper 가
               hidden 이라 ui.js 의 setShown(dartPropNewNote/dartPropSourceRow) 토글과 무관하게
               항상 숨겨진다. id·값 계약은 그대로 유지된다. -->
          <div class="dart-store" hidden aria-hidden="true">
            <div class="row"><label>대상</label><span class="prop-val" id="dartPropSide">—</span></div>
            <div class="row"><label>현재 단계</label><span class="prop-val" id="dartPropStep">—</span></div>
            <p class="note" id="dartPropNewNote" hidden>새 다트 생성</p>
            <div class="row" id="dartPropSourceRow" hidden><label>소스 다트각</label><span class="prop-val" id="dartPropSource">—</span></div>
          </div>
        </div>
      </section>
    </div>

    <svg id="cv" xmlns="http://www.w3.org/2000/svg"></svg>
  </main>

  <!-- 원형 stage 전용 치수 inspector. design stage 에서는 ui.js 가 hidden 처리하고
       CSS :has 가 280px column 도 함께 제거한다. -->
  <aside class="inspector" aria-label="속성">
    <details class="insp" open data-panel="measurements">
      <summary>원형 · 치수</summary>
      <div class="insp-body">
        <div class="row"><label>B 가슴둘레</label><input type="number" id="inpB" value="83" step="0.5" oninput="markDirty(event)"></div>
        <div class="row"><label>W 허리둘레</label><input type="number" id="inpW" value="64" step="0.5" oninput="markDirty(event)"></div>
        <div class="row"><label>BL 등길이</label><input type="number" id="inpBL" value="38" step="0.5" oninput="markDirty(event)"></div>
        <div class="row"><label>소매길이</label><input type="number" id="inpSL" value="52" step="0.5" oninput="markDirty(event)"></div>
        <div class="row"><label>소매단둘레</label><input type="number" id="inpHem" value="30" step="0.5" oninput="markDirty(event)"></div>
        <div class="row"><label>소매산 공식</label><select id="selCapFormula" onchange="if(!isMeasureDirty) render()"><option value="culture" selected>문화식</option><option value="recommended">추천식</option></select></div>
        <div class="row"><label>소매산 보정</label><input type="range" id="inpCapAdj" min="-3" max="3" step="0.1" value="3" oninput="if(!isMeasureDirty) render()"><span class="slv" id="capAdjVal">0.0</span></div>
        <div class="row"><label>다트 총량 (cm)</label><input type="number" id="inpDart" value="12.5" step="0.5" oninput="render()"></div>
        <div class="row note" id="dirtyState">패턴 생성 버튼을 누르세요</div>
        <div class="row"><button class="btn action-primary" id="btnGenerate" onclick="generatePattern()">패턴 생성 / 다시 계산</button></div>
      </div>
    </details>
  </aside>
</div>

<footer class="statusbar">
  <div class="sb" id="sb"></div>
</footer>

<!-- JS 파일 순서 중요: 의존성 순서대로 로드 -->
<script src="js/state.js?v=2026070731"></script>
<script src="js/layer.js?v=2026070731"></script>
<script src="js/draft.js?v=2026070731"></script>
<script src="js/handles.js?v=2026070731"></script>
<script src="js/render.js?v=2026070731"></script>
<script src="js/sleeve.js?v=2026070731"></script>
<script src="js/storage.js?v=2026071603"></script>
<script>const DEBUG_DART_MOVE = false;</script>
<script src="js/dartMove.js?v=2026072006"></script>
<script src="js/init.js?v=2026070731"></script>
<!-- UI 노출 상태 중앙화 (stage/tool). 기능 함수는 호출하지 않는다. -->
<script src="js/ui.js?v=2026072103"></script>

</body>
</html>
